name: Configuration File Formatting

on:
  push:
  pull_request:

jobs:
  dapperdata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6

      - name: Install Dependencies
        run: make install

      - name: Test Formatting
        run: make dapperdata_check
